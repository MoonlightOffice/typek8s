services:
  oci-registry-public:
    image: docker.io/library/registry:3
    container_name: oci-registry-public
    ports:
      - "5001:5000"
    restart: unless-stopped

  oci-registry-private:
    image: docker.io/library/registry:3
    container_name: oci-registry-private
    ports:
      - "5002:5000"
    volumes:
      - ./auth:/auth:ro
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Private Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    restart: unless-stopped
